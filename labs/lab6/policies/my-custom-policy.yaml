metadata:
  id: CKV2_CUSTOM_1
  name: Ensure S3 bucket lifecycle configuration exists
  category: GENERAL_SECURITY
  severity: HIGH

definition:
  and:
    - cond_type: filter
      resource_types:
        - aws_s3_bucket
      operator: within

    - cond_type: attribute
      attribute: lifecycle_rule
      operator: exists